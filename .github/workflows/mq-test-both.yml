name: MQ Test Both Events

# Diagnostic workflow for Cogni-DAO/node-template merge-queue spec validation.
# Fires on BOTH pull_request and merge_group. Emits a check named `mq-test-both`.
# Validates: workflows that fire on merge_group DO produce status reports on the
# queue ref, satisfying required-status-check gates.
# See: docs/spec/merge-queue-config.md in node-template.

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  mq-test-both:
    runs-on: ubuntu-latest
    steps:
      - name: Always pass
        run: echo "Hello from ${{ github.event_name }} on ${{ github.ref }}"
